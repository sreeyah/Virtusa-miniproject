<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Bill Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f6fc;
            margin: 0;
            padding: 0;
        }
        .main-box {
            max-width: 400px;
            margin: 60px auto;
            background: #fff;
            padding: 30px 24px 20px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.10);
        }
        .main-box h1 {
            text-align: center;
            color: #1a237e;
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-top: 16px;
            color: #333;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 9px;
            margin-top: 6px;
            border: 1.2px solid #b0bec5;
            border-radius: 5px;
            font-size: 15px;
            background: #f7faff;
        }
        input:focus {
            border-color: #3949ab;
            outline: none;
        }
        button {
            width: 100%;
            padding: 11px;
            margin-top: 22px;
            background: #3949ab;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #283593;
        }
        .result, .error {
            margin-top: 22px;
            padding: 13px;
            border-radius: 7px;
            font-size: 15px;
        }
        .result {
            background: #e3f2fd;
            color: #0d47a1;
            border: 1.2px solid #90caf9;
        }
        .error {
            background: #ffebee;
            color: #b71c1c;
            border: 1.2px solid #ffcdd2;
        }
    </style>
</head>
<body>
    <div class="main-box">
        <h1>Utility Bill Calculator</h1>
        <form id="billForm" autocomplete="off">
            <label for="name">Customer Name:</label>
            <input type="text" id="name" required placeholder="Enter your name">
            <label for="prev">Previous Meter Reading:</label>
            <input type="number" id="prev" min="0" required placeholder="e.g. 1000">
            <label for="curr">Current Meter Reading:</label>
            <input type="number" id="curr" min="0" required placeholder="e.g. 1200">
            <button type="submit">Calculate</button>
        </form>
        <div id="output"></div>
    </div>
    <script>
        function computeBill(units) {
            let bill = 0;
            if (units <= 100) {
                bill = units * 1.2;
            } else if (units <= 300) {
                bill = 100 * 1.2 + (units - 100) * 2.5;
            } else {
                bill = 100 * 1.2 + 200 * 2.5 + (units - 300) * 4.5;
            }
            return bill;
        }

        document.getElementById('billForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const prev = parseInt(document.getElementById('prev').value, 10);
            const curr = parseInt(document.getElementById('curr').value, 10);
            const output = document.getElementById('output');
            output.innerHTML = '';

            if (curr < prev) {
                output.innerHTML = '<div class="error">Current reading must be greater than or equal to previous reading.</div>';
                return;
            }
            const units = curr - prev;
            const bill = computeBill(units);
            const tax = bill * 0.08;
            const total = bill + tax;
            output.innerHTML = `<div class="result">
                <strong>Bill Summary</strong><br>
                Name: ${name}<br>
                Units Used: ${units}<br>
                Bill: ₹${bill.toFixed(2)}<br>
                Tax (8%): ₹${tax.toFixed(2)}<br>
                <strong>Total: ₹${total.toFixed(2)}</strong>
            </div>`;
        };
    </script>
</body>
</html>
